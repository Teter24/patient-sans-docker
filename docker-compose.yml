services:
    nginx:
        image: nginx:alpine
        container_name: laravel_nginx
        ports:
            - "8000:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - app
        networks:
            - laravel

    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: laravel_app
        working_dir: /var/www
        volumes:
            - ./:/var/www
        depends_on:
            - mysql
        networks:
            - laravel

    mysql:
        image: mysql:8.0
        container_name: laravel_mysql
        restart: always
        environment:
            MYSQL_DATABASE: patient
            MYSQL_ROOT_PASSWORD: root
            MYSQL_USER: patients_user
            MYSQL_PASSWORD: patients_pass
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - laravel

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        platform: linux/amd64
        container_name: laravel_pma
        environment:
            PMA_HOST: mysql
        depends_on:
            - mysql
        networks:
            - laravel

networks:
    laravel:

volumes:
    mysql_data:
